<div class="header-bar" x-data="header">
  <!-- 移动端：紧凑单行布局 -->
  <div x-show="deviceType === 'mobile'" class="mobile-header-compact">
    <!-- 左侧：Logo + 标题 -->
    <button
      type="button"
      class="mobile-header-left"
      @click="openMobileSidebar()"
      :class="{ 'is-active': $store.global.visibleSidebar }"
      :aria-pressed="$store.global.visibleSidebar ? 'true' : 'false'"
    >
      <div class="app-icon-mobile">
        <span>🎴</span>
      </div>
      <div class="mobile-title">STM</div>
    </button>

    <div class="mobile-header-search-row">
      <div class="mobile-header-search-tools">
        <!-- 中间：搜索框 -->
        <div
          class="mobile-search-group"
          :class="showMobileUploadButton ? '' : 'mobile-search-group--full'"
        >
          <div class="mobile-search-wrapper">
            <input
              x-show="currentMode === 'cards'"
              type="text"
              x-model.debounce.300ms="searchQuery"
              placeholder="搜索..."
              class="mobile-search-input"
            />
            <input
              x-show="currentMode === 'worldinfo'"
              type="text"
              x-model.debounce.300ms="wiSearchQuery"
              placeholder="搜索..."
              class="mobile-search-input"
            />
            <input
              x-show="currentMode === 'chats'"
              type="text"
              x-model.debounce.300ms="chatSearchQuery"
              placeholder="搜索聊天..."
              class="mobile-search-input"
            />
            <input
              x-show="currentMode === 'presets'"
              type="text"
              x-model.debounce.300ms="presetSearch"
              placeholder="搜索预设..."
              class="mobile-search-input"
            />
            <input
              x-show="['regex','scripts','quick_replies'].includes(currentMode)"
              type="text"
              x-model.debounce.300ms="extensionSearch"
              :placeholder="currentMode === 'regex' ? '搜索正则...' : (currentMode === 'scripts' ? '搜索 ST 脚本...' : '搜索快速回复...')"
              class="mobile-search-input"
            />
          </div>
          <button
            x-show="showMobileUploadButton"
            type="button"
            class="mobile-upload-btn"
            @click="triggerMobileUpload()"
          >
            <span>📥</span>
          </button>
        </div>

        <!-- 右侧：菜单按钮 -->
        <button @click="toggleMobileMenu()" class="mobile-menu-btn-compact">
          <span x-show="!showMobileMenu">☰</span>
          <span x-show="showMobileMenu">✕</span>
        </button>
      </div>

      <div
        x-show="['cards', 'worldinfo'].includes(currentMode)"
        class="mobile-search-mode-row"
      >
        <div class="mobile-search-mode-toggle">
          <button
            type="button"
            @click='searchMode = "fast"'
            :class="searchMode === 'fast' ? 'is-active' : ''"
          >
            快搜
          </button>
          <button
            type="button"
            x-show="canUseFulltextSearch"
            @click='searchMode = "fulltext"'
            :class="searchMode === 'fulltext' ? 'is-active' : ''"
          >
            全文
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 移动端：第二行 - 筛选标签（递归开关已移到菜单中） -->
  <div
    x-show="deviceType === 'mobile' && currentMode === 'cards' && (filterTags.length > 0 || $store.global.viewState.excludedTags.length > 0)"
    class="mobile-filter-bar"
  >
    <!-- 筛选标签 -->
    <div class="mobile-tags-scroll">
      <template x-for="tag in filterTags" :key="tag">
        <div class="mobile-filter-chip" title="筛选标签">
          <span class="chip-label" x-text="tag"></span>
          <button
            type="button"
            class="chip-close-btn"
            @click.stop="removeFilterTag(tag)"
            title="删除此筛选"
          >
            ×
          </button>
        </div>
      </template>
      <template
        x-for="tag in $store.global.viewState.excludedTags"
        :key="'mob-exc-'+tag"
      >
        <div class="mobile-filter-chip excluded" title="筛选标签（排除）">
          <span class="chip-label" x-text="tag"></span>
          <button
            type="button"
            class="chip-close-btn"
            @click.stop="removeFilterTag(tag)"
            title="删除此筛选"
          >
            ×
          </button>
        </div>
      </template>
    </div>
  </div>

  <!-- 桌面端：原有布局 -->
  <div
    x-show="deviceType !== 'mobile'"
    class="desktop-header-row"
    style="display: flex; align-items: center; gap: 1rem; flex: 1; width: 100%"
  >
    <div
      style="display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0"
    >
      <div
        class="app-icon"
        style="
          background: linear-gradient(135deg, var(--accent-main), #7c3aed);
          border-radius: 8px;
          padding: 0.5rem;
        "
      >
        <span style="font-size: 1.5rem">🎴</span>
      </div>
      <div>
        <span
          style="font-weight: bold; font-size: 1.125rem; white-space: nowrap"
          >ST Manager</span
        >
        <span
          style="
            font-size: 0.75rem;
            background: var(--accent-main);
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 0.25rem;
          "
          >V99</span
        >
      </div>
    </div>

    <div
      x-show="['cards', 'worldinfo'].includes(currentMode)"
      class="search-mode-toggle"
    >
      <button
        type="button"
        @click='searchMode = "fast"'
        :class="searchMode === 'fast' ? 'is-active' : ''"
      >
        快搜
      </button>
      <button
        type="button"
        x-show="canUseFulltextSearch"
        @click='searchMode = "fulltext"'
        :class="searchMode === 'fulltext' ? 'is-active' : ''"
      >
        全文
      </button>
    </div>

    <div class="index-status-chip" :class="$store.global.indexStatus.state">
      <span x-text="$store.global.indexStatus.state"></span>
      <span x-text="$store.global.indexStatus.pending_jobs"></span>
    </div>

    <!-- 桌面端：筛选标签云 -->
    <div
      style="
        display: flex;
        gap: 0.5rem;
        overflow-x: auto;
        margin-left: 1rem;
        flex: 1;
      "
      class="custom-scrollbar"
    >
      <!-- 排除目录的 Chips -->
      <template
        x-for="cat in $store.global.viewState.excludedCategories"
        :key="cat"
      >
        <div
          class="filter-chip"
          style="background-color: #dc2626; border: 1px solid #ef4444"
          title="筛选目录（排除）"
        >
          <span class="chip-label" x-text="'🚫 ' + cat"></span>
          <button
            type="button"
            class="chip-close-btn"
            @click.stop="toggleExcludedCategory(cat)"
            title="删除此筛选"
          >
            ×
          </button>
        </div>
      </template>
      <!-- 包含的标签 (绿色/主题色) -->
      <template x-for="tag in filterTags" :key="'inc-'+tag">
        <div class="filter-chip" title="筛选标签">
          <span class="chip-label" x-text="tag"></span>
          <button
            type="button"
            class="chip-close-btn"
            @click.stop="removeFilterTag(tag)"
            title="删除此筛选"
          >
            ×
          </button>
        </div>
      </template>

      <!-- 排除的标签 (红色) -->
      <template
        x-for="tag in $store.global.viewState.excludedTags"
        :key="'exc-'+tag"
      >
        <div class="filter-chip excluded" title="筛选标签（排除）">
          <span class="chip-label" x-text="tag"></span>
          <button
            type="button"
            class="chip-close-btn"
            @click.stop="removeFilterTag(tag)"
            title="删除此筛选"
          >
            ×
          </button>
        </div>
      </template>
    </div>
  </div>

  <!-- 桌面端：右侧操作区 -->
  <div
    x-show="deviceType !== 'mobile'"
    style="display: flex; align-items: center; gap: 0.5rem"
  >
    <!-- 选中状态栏 -->
    <div
      x-show="selectedIds.length > 0"
      class="selection-bar flex items-center gap-4 border px-3 py-1.5 rounded-lg mr-2 relative"
      style="
        background-color: var(--accent-faint);
        border-color: var(--accent-light);
        z-index: var(--z-card-selected);
        overflow: visible;
      "
    >
      <button
        x-show="currentMode === 'cards' || currentMode === 'worldinfo' || currentMode === 'presets'"
        @click="toggleSelectAll()"
        class="text-xs px-2 py-1 rounded text-white transition-all"
        :style="isCurrentPageAllSelected ? 'background-color: #ef4444;' : 'background-color: #10b981;'"
        :title="isCurrentPageAllSelected ? '取消全选当前页' : '全选当前页'"
      >
        <span x-show="!isCurrentPageAllSelected">全选</span>
        <span x-show="isCurrentPageAllSelected">取消全选</span>
      </button>
      <button
        x-show="currentMode === 'cards'"
        @click.stop="openBatchTagModal()"
        class="text-xs px-2 py-1 rounded text-white"
        style="background-color: #7c3aed; transition: all 0.2s"
      >
        批量标签
      </button>
      <button
        x-show="currentMode === 'cards'"
        @click="deleteSelectedCards()"
        class="text-xs bg-red-800 hover:bg-red-700 px-2 py-1 rounded text-white border border-red-600/50 transition-all"
      >
        🗑️ 移至回收站
      </button>
      <button
        x-show="currentMode === 'worldinfo' && canMoveWorldInfoSelection()"
        @click="moveSelectedWorldInfo()"
        class="text-xs px-2 py-1 rounded text-white bg-blue-700 hover:bg-blue-600 transition-all"
      >
        📂 移动分类
      </button>
      <button
        x-show="currentMode === 'worldinfo' && canDeleteWorldInfoSelection()"
        @click="deleteSelectedWorldInfo()"
        class="text-xs bg-red-800 hover:bg-red-700 px-2 py-1 rounded text-white border border-red-600/50 transition-all"
      >
        🗑️ 删除世界书
      </button>
      <button
        x-show="currentMode === 'presets' && canMovePresetSelection()"
        @click="moveSelectedPresets()"
        class="text-xs px-2 py-1 rounded text-white bg-blue-700 hover:bg-blue-600 transition-all"
      >
        📂 移动分类
      </button>
      <button
        x-show="currentMode === 'presets' && canDeletePresetSelection()"
        @click="deleteSelectedPresets()"
        class="text-xs bg-red-800 hover:bg-red-700 px-2 py-1 rounded text-white border border-red-600/50 transition-all"
      >
        🗑️ 删除预设
      </button>
      <span class="text-sm text-accent"
        >已选 <span x-text="selectedIds.length" class="font-bold"></span
      ></span>
      <button
        @click="selectedIds = []"
        class="text-xs hover:text-white cursor-pointer"
        style="color: var(--text-sub)"
      >
        取消
      </button>
      <!-- 批量执行规则按钮 -->
      <div
        x-show="currentMode === 'cards'"
        x-data="{ showRuleMenu: false }"
        class="relative"
      >
        <button
          @click="showRuleMenu = !showRuleMenu; if(showRuleMenu) $dispatch('load-rulesets-for-menu')"
          class="text-xs px-2 py-1 rounded text-white bg-yellow-600 hover:bg-yellow-500 transition-all flex items-center gap-1"
        >
          <span>🤖</span> 自动处理
        </button>
        <!-- 下拉菜单：列出可用规则集 -->
        <div
          x-show="showRuleMenu"
          @click.away="showRuleMenu = false"
          x-transition:enter="transition ease-out duration-100"
          x-transition:enter-start="opacity-0 scale-95"
          x-transition:enter-end="opacity-100 scale-100"
          class="absolute top-full left-0 mt-2 w-56 bg-[var(--bg-panel)] border border-[var(--border-light)] rounded-lg shadow-2xl py-1"
          style="z-index: var(--z-dropdown)"
        >
          <!-- 这个列表由全局 store 管理 -->
          <template x-for="rs in $store.global.availableRuleSets" :key="rs.id">
            <button
              @click="executeRuleSet(rs.id); showRuleMenu=false"
              class="w-full text-left px-3 py-2 text-xs hover:bg-[var(--bg-hover)] text-[var(--text-main)] block"
              x-text="rs.meta && rs.meta.name ? rs.meta.name : rs.id"
            ></button>
          </template>
          <div
            x-show="!$store.global.availableRuleSets || $store.global.availableRuleSets.length===0"
            class="px-3 py-2 text-xs text-[var(--text-dim)]"
          >
            无规则集
          </div>
          <div class="border-t border-[var(--border-light)] mt-1 pt-1">
            <button
              @click="$dispatch('open-automation-modal'); showRuleMenu=false"
              class="w-full text-left px-3 py-2 text-xs text-blue-400 hover:bg-[var(--bg-hover)]"
            >
              ⚙️ 管理规则...
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- 搜索与筛选区 -->
    <div class="header-search-block ml-auto mr-4">
      <div class="search-container header-search-container">
        <div
          x-show="currentMode === 'cards'"
          class="search-type-inline"
          title="决定搜索匹配的字段范围"
        >
          <span class="search-type-label">搜索方式</span>
          <select x-model="searchType" class="search-type-select">
            <option value="mix">智能混合</option>
            <option value="global">全局关键字</option>
            <option value="name">角色名称</option>
            <option value="filename">文件名</option>
            <option value="creator">创作者</option>
            <option value="tags">标签</option>
          </select>
        </div>

        <input
          x-show="currentMode === 'cards'"
          type="text"
          x-model.debounce.300ms="searchQuery"
          :placeholder="searchScope === 'full' ? '全量搜索（已忽略筛选）...' : '搜索角色卡...'"
          class="search-input"
          :class="currentMode === 'cards' ? 'search-input-with-type' : 'search-input-standalone'"
        />
        <input
          x-show="currentMode === 'worldinfo'"
          type="text"
          x-model.debounce.300ms="wiSearchQuery"
          placeholder="搜索世界书名称..."
          class="search-input"
          :class="currentMode === 'cards' ? 'search-input-with-type' : 'search-input-standalone'"
        />
        <input
          x-show="currentMode === 'chats'"
          type="text"
          x-model.debounce.300ms="chatSearchQuery"
          placeholder="搜索聊天标题、角色或预览..."
          class="search-input"
          :class="currentMode === 'cards' ? 'search-input-with-type' : 'search-input-standalone'"
        />
        <input
          x-show="currentMode === 'presets'"
          type="text"
          x-model.debounce.300ms="presetSearch"
          placeholder="搜索预设名称..."
          class="search-input"
          :class="currentMode === 'cards' ? 'search-input-with-type' : 'search-input-standalone'"
        />
        <input
          x-show="['regex','scripts','quick_replies'].includes(currentMode)"
          type="text"
          x-model.debounce.300ms="extensionSearch"
          :placeholder="currentMode === 'regex' ? '搜索正则脚本...' : (currentMode === 'scripts' ? '搜索 ST 脚本...' : '搜索快速回复...')"
          class="search-input"
          :class="currentMode === 'cards' ? 'search-input-with-type' : 'search-input-standalone'"
        />
        <button
          x-show="currentMode === 'cards' && searchQuery"
          @click="searchQuery=''"
          class="search-clear-btn"
        >
          ✕
        </button>
        <button
          x-show="currentMode === 'presets' && presetSearch"
          @click="presetSearch=''"
          class="search-clear-btn"
        >
          ✕
        </button>
        <button
          x-show="['regex','scripts','quick_replies'].includes(currentMode) && extensionSearch"
          @click="extensionSearch=''"
          class="search-clear-btn"
        >
          ✕
        </button>
      </div>

      <button
        x-show="currentMode === 'cards'"
        type="button"
        class="header-advanced-filter-btn"
        :class="cardAdvancedFilterCount > 0 ? 'is-active' : ''"
        @click="openCardAdvancedFilter()"
        :title="cardAdvancedFilterCount > 0 ? `已启用 ${cardAdvancedFilterCount} 个筛选条件` : '打开高级筛选'"
      >
        <span class="header-advanced-filter-icon">⚲</span>
        <span class="header-advanced-filter-btn-meta">
          <span class="header-advanced-filter-label">筛选工作台</span>
          <span class="header-advanced-filter-status">
            <span
              x-text="cardAdvancedFilterCount > 0 ? `已启用 ${cardAdvancedFilterCount} 项条件` : '当前无附加条件'"
            ></span>
          </span>
        </span>
        <span
          class="header-advanced-filter-count"
          x-show="cardAdvancedFilterCount > 0"
          x-text="cardAdvancedFilterCount"
        ></span>
      </button>
    </div>

    <!-- 工具按钮组 -->
    <div
      class="tool-buttons"
      style="display: flex; gap: 0.5rem; margin-left: 0.5rem"
    >
      <button
        x-show="currentMode === 'worldinfo'"
        @click="createWorldInfoBook()"
        title="新建世界书（SillyTavern 兼容）"
        class="btn-secondary hover:scale-105 transition-transform"
      >
        ➕
      </button>
      <button
        @click="randomByMode()"
        :title="currentMode === 'cards' ? '🎲 手气不错，随机角色' : (currentMode === 'worldinfo' ? '🎲 手气不错，随机世界书' : '🎲 手气不错，随机聊天')"
        class="hover:scale-110 transition-transform active:rotate-180 duration-300"
        style="
          padding: 0.5rem;
          background: linear-gradient(135deg, var(--accent-main), #7c3aed);
          border: 1px solid var(--accent-light);
          border-radius: 0.5rem;
          cursor: pointer;
          color: white;
          display: flex;
          align-items: center;
          justify-content: center;
        "
      >
        🎲
      </button>
      <button
        @click="openUrlImport()"
        :disabled="!canOpenUrlImport"
        :class="canOpenUrlImport ? 'btn-secondary hover:scale-105' : 'opacity-50 cursor-not-allowed btn-secondary'"
        :title="urlImportTitle"
        class="btn-secondary transition-all"
      >
        🌐
      </button>
      <button
        @click="currentMode === 'cards' ? fetchCards() : (currentMode === 'worldinfo' ? fetchWorldInfoList() : fetchChats())"
        title="刷新"
        class="btn-secondary hover:scale-105 transition-transform"
      >
        ↻
      </button>
      <button
        @click="toggleDarkMode()"
        :title="isDarkMode ? '切换到浅色模式' : '切换到深色模式'"
        class="btn-secondary hover:scale-105 transition-transform"
      >
        <span x-text="isDarkMode ? '🌙' : '☀️'"></span>
      </button>
      <button
        @click="$dispatch('open-automation-modal')"
        title="自动化规则管理"
        class="btn-secondary hover:scale-105 transition-transform text-yellow-500"
      >
        🤖
      </button>
      <button
        @click="openSettings()"
        title="系统设置"
        class="btn-secondary hover:scale-105 transition-transform"
      >
        ⚙️
      </button>
    </div>
  </div>

  <!-- 移动端：选中状态栏（独立显示） -->
  <div
    x-show="deviceType === 'mobile' && selectedIds.length > 0"
    class="mobile-selection-bar"
    style="
      margin-top: 0.5rem;
      padding: 0.5rem;
      background-color: var(--accent-faint);
      border-radius: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    "
  >
    <span
      x-show="selectedIds.length > 0"
      class="text-xs"
      style="color: var(--text-main)"
      >已选 <span x-text="selectedIds.length" class="font-bold"></span
    ></span>
    <button
      x-show="currentMode === 'cards' || currentMode === 'presets'"
      @click="toggleSelectAll()"
      class="text-xs px-2 py-1 rounded text-white transition-all"
      :style="isCurrentPageAllSelected ? 'background-color: #ef4444;' : 'background-color: #10b981;'"
      :title="isCurrentPageAllSelected ? '取消全选当前页' : '全选当前页'"
    >
      <span x-show="!isCurrentPageAllSelected">全选</span>
      <span x-show="isCurrentPageAllSelected">取消全选</span>
    </button>
    <button
      x-show="selectedIds.length > 0 && currentMode === 'cards'"
      @click="openBatchTagModal()"
      class="text-xs px-2 py-1 rounded text-white"
      style="background-color: #7c3aed"
    >
      标签
    </button>
    <button
      x-show="selectedIds.length > 0 && currentMode === 'cards'"
      @click="openMoveModal()"
      class="text-xs px-2 py-1 rounded text-white"
      style="background-color: #10b981"
    >
      📂
    </button>
    <button
      x-show="selectedIds.length > 0 && currentMode === 'cards'"
      @click="openExecuteRulesMobile()"
      class="text-xs px-2 py-1 rounded text-white"
      style="background-color: #f59e0b"
    >
      🤖
    </button>
    <button
      x-show="selectedIds.length > 0 && currentMode === 'presets' && canMovePresetSelection()"
      @click="moveSelectedPresets()"
      class="text-xs px-2 py-1 rounded text-white"
      style="background-color: #10b981"
    >
      📂
    </button>
    <button
      x-show="selectedIds.length > 0 && currentMode === 'presets' && canDeletePresetSelection()"
      @click="deleteSelectedPresets()"
      class="text-xs px-2 py-1 rounded text-white bg-red-800"
    >
      🗑️
    </button>
    <button
      x-show="currentMode === 'cards'"
      @click="deleteSelectedCards()"
      class="text-xs px-2 py-1 rounded text-white bg-red-800"
    >
      🗑️
    </button>
    <button
      @click="selectedIds = []"
      class="text-xs px-2 py-1 rounded"
      style="background-color: var(--bg-sub); color: var(--text-main)"
    >
      取消
    </button>
  </div>

  <!-- 移动端：展开菜单 -->
  <div
    x-show="deviceType === 'mobile' && showMobileMenu"
    @click.away="closeMobileMenu()"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 -translate-y-2"
    x-transition:enter-end="opacity-100 translate-y-0"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100 translate-y-0"
    x-transition:leave-end="opacity-0 -translate-y-2"
    class="mobile-menu"
  >
    <!-- 搜索类型选择（移动端） -->
    <div x-show="currentMode === 'cards'" class="mobile-menu-section">
      <label class="mobile-menu-label">搜索类型</label>
      <select x-model="searchType" class="mobile-menu-select">
        <option value="mix">✨ 智能混合</option>
        <option value="global">🌍 全局关键字</option>
        <option value="name">👤 角色名称</option>
        <option value="filename">📄 文件名</option>
        <option value="creator">🎨 创作者</option>
        <option value="tags">🏷️ 标签</option>
      </select>
    </div>

    <div x-show="currentMode === 'cards'" class="mobile-menu-section">
      <button
        type="button"
        class="mobile-menu-btn-item mobile-advanced-filter-entry"
        @click="openCardAdvancedFilter(); closeMobileMenu()"
      >
        <div class="mobile-advanced-filter-entry-main">
          <div class="mobile-advanced-filter-entry-icon">⚗️</div>
          <div>
            <div class="mobile-advanced-filter-entry-title">高级筛选</div>
            <div class="mobile-advanced-filter-entry-status">
              <span
                x-text="cardAdvancedFilterCount > 0 ? `已启用 ${cardAdvancedFilterCount} 项条件` : '当前无附加条件'"
              ></span>
            </div>
            <div class="mobile-advanced-filter-entry-desc">
              范围、收藏、时间、Token、标签
            </div>
          </div>
        </div>
        <div
          class="mobile-advanced-filter-entry-count"
          x-show="cardAdvancedFilterCount > 0"
          x-text="cardAdvancedFilterCount"
        ></div>
      </button>
    </div>

    <!-- 工具按钮（移动端） -->
    <div class="mobile-menu-grid">
      <button
        x-show="currentMode === 'worldinfo'"
        @click="createWorldInfoBook(); closeMobileMenu()"
        class="mobile-menu-btn-item"
      >
        <div class="menu-icon">➕</div>
        <div class="menu-label">新建世界书</div>
      </button>
      <button
        x-show="currentMode === 'chats'"
        @click="triggerChatImport(); closeMobileMenu()"
        class="mobile-menu-btn-item"
      >
        <div class="menu-icon">📥</div>
        <div class="menu-label">导入聊天</div>
      </button>
      <button
        @click="randomByMode(); closeMobileMenu()"
        class="mobile-menu-btn-item"
      >
        <div class="menu-icon">🎲</div>
        <div class="menu-label">随机</div>
      </button>
      <button
        @click="openUrlImport(); closeMobileMenu()"
        :disabled="!canOpenUrlImport"
        :class="canOpenUrlImport ? 'mobile-menu-btn-item' : 'mobile-menu-btn-item opacity-50'"
      >
        <div class="menu-icon">🌐</div>
        <div class="menu-label">URL导入</div>
      </button>
      <button
        @click="currentMode === 'cards' ? fetchCards() : (currentMode === 'worldinfo' ? fetchWorldInfoList() : fetchChats()); closeMobileMenu()"
        class="mobile-menu-btn-item"
      >
        <div class="menu-icon">↻</div>
        <div class="menu-label">刷新</div>
      </button>
      <button
        @click="toggleDarkMode(); closeMobileMenu()"
        class="mobile-menu-btn-item"
      >
        <div class="menu-icon" x-text="isDarkMode ? '🌙' : '☀️'"></div>
        <div class="menu-label">主题</div>
      </button>
      <button
        @click="$dispatch('open-automation-modal'); closeMobileMenu()"
        class="mobile-menu-btn-item accent"
      >
        <div class="menu-icon">🤖</div>
        <div class="menu-label">规则</div>
      </button>
      <button
        @click="openSettings(); closeMobileMenu()"
        class="mobile-menu-btn-item"
      >
        <div class="menu-icon">⚙️</div>
        <div class="menu-label">设置</div>
      </button>
    </div>

    <!-- 收藏筛选（移动端） -->
    <button
      x-show="showFavoriteFilter"
      @click="toggleFavFilter(); closeMobileMenu()"
      class="mobile-favorite-btn transition-colors"
      :class="{
                'active': activeFavFilter === 'included',
                'excluded': activeFavFilter === 'excluded'
            }"
    >
      <span class="favorite-icon">♥</span>

      <span x-text="favoriteFilterLabel"></span>
    </button>
  </div>
</div>
