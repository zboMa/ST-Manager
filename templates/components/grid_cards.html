<!-- === 模式 1: 角色卡网格 === -->
<div
  x-show="currentMode === 'cards'"
  x-data="cardGrid"
  class="flex-1 min-h-0 flex flex-col overflow-hidden w-full"
>
  <!-- legacy hook: class="card-filter-summary-bar" -->
  <div
    x-show="$store.global.getCardAdvancedFilterSummaryItems().length > 0"
    class="card-filter-summary-bar custom-scrollbar"
  >
    <div class="card-filter-summary-label">当前筛选</div>
    <div class="card-filter-summary-list">
      <template
        x-for="item in $store.global.getCardAdvancedFilterSummaryItems()"
        :key="item.key"
      >
        <div class="card-filter-summary-chip">
          <button
            type="button"
            class="card-filter-summary-chip-main"
            @click="$store.global.openCardAdvancedFilterDrawer(item.section)"
            :title="`查看筛选：${item.label}`"
          >
            <span
              class="card-filter-summary-chip-label"
              x-text="item.label"
            ></span>
          </button>
          <button
            type="button"
            class="card-filter-summary-chip-remove"
            @click.stop="$store.global.clearCardAdvancedFilterItem(item.key)"
            :title="`清除筛选：${item.label}`"
          >
            ×
          </button>
        </div>
      </template>
    </div>
    <button
      type="button"
      class="card-filter-summary-clear-all"
      @click="$store.global.clearAllCardAdvancedFilters()"
    >
      清空全部
    </button>
  </div>

  <!-- 滚动区域 -->
  <div
    class="card-scroll-area custom-scrollbar relative flex-1"
    id="main-scroll"
    @click="selectedIds = []"
    @dragenter.prevent="handleMainDragEnter($event)"
    @dragover.prevent="dragOverMain = true"
    @dragleave.prevent="handleMainDragLeave($event)"
    @drop.prevent="handleMainDragLeave($event); handleFilesDrop($event, null)"
  >
    <!-- 拖拽上传遮罩 -->
    <div
      x-show="dragOverMain"
      x-transition.opacity
      class="drag-over-main-overlay"
    >
      <div class="text-6xl mb-4">📂</div>
      <div class="text-2xl font-bold text-white tracking-wider">
        松开鼠标上传卡片
      </div>
      <div class="text-gray-300 mt-2 text-sm">将添加到当前目录</div>
    </div>

    <div
      x-show="isLoading"
      style="text-align: center; padding: 5rem; color: var(--accent-light)"
    >
      数据加载中...
    </div>

    <div x-show="!isLoading" class="card-grid">
      <div
        class="card-grid-virtual-spacer card-grid-virtual-spacer--top"
        :style="virtualTopSpacerStyle"
      ></div>
      <template
        x-for="card in visibleCards"
        :key="card.id"
        @click="selectedIds = []"
      >
        <!-- ... (角色卡模板内容保持不变) ... -->
        <div
          class="st-card group"
          :data-card-id="card.id"
          :class="{'selected': selectedIds.includes(card.id), 'is-favorite': card.is_favorite, 'card-highlight-anim': highlightId === card.id, 'is-flipped': isCardFlipped(card.id)}"
          x-effect="if(highlightId === card.id) $el.scrollIntoView({ behavior: 'smooth', block: 'start' })"
          @click.stop="handleCardClick($event, card)"
          @mouseenter="handleCardMouseEnter(card.id)"
          @mouseleave="handleCardMouseLeave(card.id)"
          draggable="true"
          @dragstart="dragStart($event, card)"
        >
          <div
            class="card-flip-inner"
            :class="{'is-flipped': isCardFlipped(card.id)}"
          >
            <div class="card-face card-front">
              <div class="card-front-topbar">
                <div class="card-front-meta-left">
                  <!-- Token 计数 -->
                  <div
                    :class="getCardGridTokenBadgeClass(card.token_count)"
                    class="card-meta-chip card-meta-token"
                    title="Token 估算"
                  >
                    <span x-text="card.token_count"></span>
                    <span class="card-meta-token-unit">T</span>
                  </div>
                </div>

                <div class="card-front-meta-right">
                  <div
                    x-show="card.char_version && card.char_version.trim() !== ''"
                    :title="`版本：${card.char_version}`"
                    class="card-meta-chip card-meta-version"
                  >
                    <span x-text="card.char_version"></span>
                  </div>

                  <div
                    x-show="card.is_bundle"
                    class="card-meta-chip card-meta-bundle"
                    :title="`包模式版本数：${card.versions ? card.versions.length : 0}`"
                  >
                    📦 v<span
                      x-text="card.versions ? card.versions.length : 0"
                    ></span>
                  </div>
                </div>
              </div>

              <div class="card-image-container">
                <!-- 选择勾选框 -->
                <button
                  type="button"
                  class="card-select-indicator card-select-overlay"
                  :class="{
                                        'is-selected': selectedIds.includes(card.id),
                                        'is-mobile': $store.global.deviceType === 'mobile'
                                    }"
                  @click.stop="toggleSelection(card)"
                  title="选择角色卡"
                >
                  <div
                    class="w-6 h-6 rounded-full border-2 flex items-center justify-center transition-all duration-200 shadow-sm"
                    :class="selectedIds.includes(card.id) ? 'bg-blue-600 border-blue-500 text-white scale-105' : 'bg-black/25 border-gray-400/60 hover:bg-black/50 hover:border-white/80 text-white/80'"
                  >
                    <span
                      x-show="selectedIds.includes(card.id)"
                      class="text-xs font-bold"
                      >✓</span
                    >
                  </div>
                </button>

                <button
                  type="button"
                  @click.stop="toggleCardFav(card)"
                  class="card-fav-btn card-fav-overlay"
                  :class="{
                                        'is-active': card.is_favorite,
                                        'is-mobile': $store.global.deviceType === 'mobile'
                                    }"
                  :title="card.is_favorite ? '取消收藏' : '加入收藏'"
                >
                  <span class="card-fav-icon">♥</span>
                </button>

                <img
                  class="card-image-media"
                  :src="card.thumb_url"
                  loading="lazy"
                  onerror="
                    this.onerror = null;
                    this.src = '/static/images/default_card.png';
                  "
                />

                <div class="card-image-overlay">
                  <div class="card-overlay-actions">
                    <a
                      x-show="card.source_link"
                      :href="card.source_link"
                      target="_blank"
                      @click.stop
                      title="访问来源页面"
                      class="card-source-link-fab"
                      rel="noopener noreferrer"
                    >
                      🌐
                    </a>
                  </div>

                  <div class="card-tags-wrap card-image-tags-wrap">
                    <div class="card-tags-row">
                      <template
                        x-for="(tag, idx) in card.tags.slice(0, getVisibleTagLimit())"
                        :key="`${card.id}-tag-${idx}-${tag}`"
                      >
                        <button
                          type="button"
                          class="card-tag card-tag-filter"
                          @click.stop="$store.global.toggleFilterTag(tag, { forceExclude: !!$event.shiftKey })"
                          :class="{
                                                        'is-included': $store.global.viewState.filterTags.includes(tag),
                                                        'is-excluded': $store.global.viewState.excludedTags.includes(tag)
                                                    }"
                          :style="(!$store.global.viewState.filterTags.includes(tag) && !$store.global.viewState.excludedTags.includes(tag)) ? getReadableTagChipStyle(tag) : ''"
                          :title="$store.global.viewState.filterTags.includes(tag) ? `标签：${tag}（已包含，点击改为排除）` : ($store.global.viewState.excludedTags.includes(tag) ? `标签：${tag}（已排除，点击取消筛选）` : `标签：${tag}（点击加入筛选，Shift+点击可直接排除）`)"
                        >
                          <span x-text="tag"></span>
                        </button>
                      </template>
                    </div>
                    <div
                      x-show="card.tags.length > getVisibleTagLimit()"
                      class="card-tags-more"
                    >
                      +<span
                        x-text="card.tags.length - getVisibleTagLimit()"
                      ></span>
                      个标签
                    </div>
                  </div>

                  <h3 class="card-image-char-name" x-text="card.char_name"></h3>
                </div>
              </div>
            </div>

            <div class="card-face card-back">
              <div class="card-back-header">
                <p class="card-back-title">文件名</p>
                <p
                  class="card-back-filename"
                  :title="card.filename"
                  x-text="card.filename || '未知文件名'"
                ></p>
                <div
                  class="card-back-category"
                  :title="`分类：${(card.category && card.category.trim()) ? card.category : '根目录'}`"
                >
                  <span class="card-back-category-icon">📁</span>
                  <span
                    class="card-back-category-text"
                    x-text="formatCategoryLabel(card.category)"
                  ></span>
                </div>
              </div>
              <div class="card-info card-back-info">
                <div class="card-back-times">
                  <div
                    class="card-back-time-row"
                    :title="`导入时间：${formatCardBackDateFull(card.import_time || card.last_modified)}`"
                  >
                    <span class="card-back-time-label">导入</span>
                    <span
                      class="card-back-time-value"
                      x-text="formatCardBackDate(card.import_time || card.last_modified)"
                    ></span>
                  </div>
                  <div
                    class="card-back-time-row"
                    :title="`修改时间：${formatCardBackDateFull(card.last_modified)}`"
                  >
                    <span class="card-back-time-label">修改</span>
                    <span
                      class="card-back-time-value"
                      x-text="formatCardBackDate(card.last_modified)"
                    ></span>
                  </div>
                </div>
                <div
                  class="local-note-preview custom-scrollbar card-back-note"
                  @click.stop
                  :class="card.ui_summary ? 'note-text' : 'note-placeholder'"
                  title="本地备注"
                  x-text="card.ui_summary || '无本地备注...'"
                ></div>
              </div>
            </div>
          </div>

          <div class="card-bottom-toolbar" @click.stop>
            <button
              type="button"
              class="card-local-note-btn"
              :class="cardHasLocalNote(card) ? 'has-note' : 'no-note'"
              :disabled="!cardHasLocalNote(card)"
              :title="cardHasLocalNote(card) ? '查看本地备注预览' : '暂无本地备注'"
              @click.stop="openCardLocalNote(card)"
            >
              📝
            </button>
            <button
              type="button"
              class="card-send-st-btn"
              :class="{ 'has-sent': cardHasBeenSentToST(card), 'is-sending': isSendingToST(card.id) }"
              :disabled="isSendingToST(card.id)"
              :title="getCardSendToSTTitle(card)"
              @click.stop="sendCardToST(card)"
            >
              <span x-show="!isSendingToST(card.id)">🚀</span>
              <span x-show="isSendingToST(card.id)">⏳</span>
            </button>
          </div>

          <button
            type="button"
            class="card-flip-corner"
            :class="[isCardFlipped(card.id) ? 'is-active' : '', $store.global.deviceType === 'mobile' ? 'is-mobile' : '']"
            :aria-label="isCardFlipped(card.id) ? '翻回正面' : '翻到背面'"
            @click.stop="toggleCardFace(card.id)"
            :title="isCardFlipped(card.id) ? '翻回正面' : '翻到背面'"
          ></button>
        </div>
      </template>
      <div
        class="card-grid-virtual-spacer card-grid-virtual-spacer--bottom"
        :style="virtualBottomSpacerStyle"
      ></div>
    </div>

    <div
      x-show="!isLoading && paginatedCards.length===0"
      style="text-align: center; padding: 5rem; color: var(--text-dim)"
    >
      <p style="font-size: 1.125rem">未找到卡片</p>
      <p class="text-sm mt-2">（也可以直接拖拽文件到这里上传）</p>
    </div>
  </div>

  <!-- 底部翻页栏 (Fixed in Cards Mode) -->
  <div
    class="pagination-bar card-pagination-bar"
    x-show="filteredCards.length>0"
    style="flex-shrink: 0"
  >
    <div class="card-pagination-summary">
      <span
        class="card-pagination-total"
        style="font-size: 0.75rem; color: var(--text-dim)"
        >共 <span x-text="totalItems"></span> 张</span
      >

      <div class="card-flip-toolbar" x-show="paginatedCards.length > 0">
        <button
          @click="toggleBulkFlipMode()"
          class="btn-secondary card-flip-all-btn"
          :title="bulkBackMode ? '将当前页全部翻回正面（并关闭背面模式）' : '将当前页全部翻到背面（并保持背面模式）'"
        >
          <span x-show="$store.global.deviceType !== 'mobile' && !bulkBackMode"
            >一键翻到背面</span
          >
          <span x-show="$store.global.deviceType !== 'mobile' && bulkBackMode"
            >一键翻回正面</span
          >
          <span x-show="$store.global.deviceType === 'mobile' && !bulkBackMode"
            >翻面</span
          >
          <span x-show="$store.global.deviceType === 'mobile' && bulkBackMode"
            >正面</span
          >
        </button>
        <span
          x-show="$store.global.deviceType !== 'mobile'"
          class="card-flip-count"
          x-text="`背面 ${visibleFlippedCount}/${paginatedCards.length}`"
        ></span>
      </div>
    </div>

    <div class="card-pagination-controls card-pagination-page-cluster">
      <button
        @click="changePage(currentPage-1)"
        :disabled="currentPage===1"
        class="btn-secondary card-page-nav-btn"
        style="padding: 0.25rem 0.5rem"
      >
        上一页
      </button>
      <span
        class="card-pagination-page-indicator"
        style="
          padding: 0.25rem 0.5rem;
          background: var(--bg-sub);
          border-radius: 0.25rem;
          color: var(--text-main);
          font-size: 0.75rem;
          height: 100%;
        "
        x-text="currentPage + '/' + totalPages"
      ></span>
      <button
        @click="changePage(currentPage+1)"
        :disabled="currentPage===totalPages"
        class="btn-secondary card-page-nav-btn"
        style="padding: 0.25rem 0.5rem"
      >
        下一页
      </button>
    </div>
  </div>
</div>
