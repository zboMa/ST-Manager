<!-- 标签筛选大模态框 -->
<div
  x-show="showTagFilterModal"
  x-data="tagFilterModal"
  x-cloak
  class="modal-overlay"
  :class="isDesktopWorkspaceFullscreen && $store.global.deviceType !== 'mobile' ? 'modal-overlay--desktop-workspace-fullscreen' : ''"
>
  <div
    class="tag-modal-container"
    :class="[isDesktopWorkspaceFullscreen && $store.global.deviceType !== 'mobile' ? 'tag-modal-container--desktop-fullscreen' : '', $store.global.deviceType !== 'mobile' ? 'tag-modal-container--desktop-workspace' : '']"
    @click.away="requestCloseTagFilterEditor()"
  >
    <template x-if="$store.global.deviceType === 'mobile'">
      <div
        x-show="$store.global.deviceType === 'mobile'"
        class="tag-filter-mobile-shell"
      >
        <div class="tag-filter-mobile-topbar">
          <div>
            <div class="text-xs" style="color: var(--text-dim)">
              移动端标签工具
            </div>
            <div style="font-size: 1rem; font-weight: 700">标签库筛选</div>
          </div>
          <button
            @click="requestCloseTagFilterEditor()"
            style="
              color: var(--text-dim);
              font-size: 1.25rem;
              background: none;
              border: none;
              cursor: pointer;
            "
          >
            ✕
          </button>
        </div>
        <div
          class="tag-filter-mobile-tabs"
          role="tablist"
          aria-label="标签筛选模式切换"
        >
          <button
            type="button"
            role="tab"
            @click="switchMobileTagTab('filter')"
            :aria-selected="mobileActiveTab === 'filter'"
          >
            筛选
          </button>
          <button
            type="button"
            role="tab"
            @click="switchMobileTagTab('sort')"
            :aria-selected="mobileActiveTab === 'sort'"
          >
            排序
          </button>
          <button
            type="button"
            role="tab"
            @click="switchMobileTagTab('delete')"
            :aria-selected="mobileActiveTab === 'delete'"
          >
            删除
          </button>
          <button
            type="button"
            role="tab"
            @click="switchMobileTagTab('category')"
            :aria-selected="mobileActiveTab === 'category'"
          >
            分类
          </button>
        </div>
        <div class="tag-filter-mobile-utility">
          <div
            x-show="$store.global.deviceType === 'mobile' && mobileActiveTab === 'filter'"
            class="tag-filter-mobile-panel tag-filter-mobile-panel--filter"
          >
            <input
              type="text"
              x-model="tagSearchQuery"
              placeholder="搜索标签..."
              class="form-input"
              :disabled="isSortMode"
              :style="isSortMode ? 'padding: 0.75rem; font-size: 1rem; opacity: 0.6; cursor: not-allowed;' : 'padding: 0.75rem; font-size: 1rem;'"
            />
            <div x-show="!isSortMode" class="tag-category-filter-row">
              <button
                type="button"
                class="tag-category-filter-pill"
                :class="isCategoryFilterAllMixed ? 'active-mixed' : ''"
                @click="showAllCategoriesMixed()"
                title="显示全部分类（混合显示）"
              >
                全部（混合）
              </button>
              <template
                x-for="name in filterCategoryNames"
                :key="'m-fcat-' + name"
              >
                <button
                  type="button"
                  class="tag-category-filter-pill"
                  :class="{
                                    'active-included': getCategoryFilterState(name) === 'included',
                                    'active-excluded': getCategoryFilterState(name) === 'excluded'
                                }"
                  :style="`--tag-cat-color:${getCategoryColor(name)};`"
                  @click="toggleCategoryFilter(name, $event)"
                >
                  <span class="tag-category-filter-dot"></span>
                  <span x-text="name"></span>
                </button>
              </template>
            </div>
          </div>
          <div
            x-show="$store.global.deviceType === 'mobile' && mobileActiveTab === 'delete'"
            class="tag-filter-mobile-panel tag-filter-mobile-panel--delete"
          >
            <div class="text-xs" style="color: var(--text-dim)">
              已选择
              <span
                class="text-accent font-bold"
                x-text="selectedTagsForDeletion.length"
              ></span>
              个待删除标签
            </div>
          </div>
          <div
            x-show="$store.global.deviceType === 'mobile' && mobileActiveTab === 'sort'"
            class="tag-filter-mobile-panel tag-filter-mobile-panel--sort"
          >
            <div class="text-xs" style="color: var(--text-dim)">
              使用上下按钮调整顺序，保存后将同步到全局标签库。
            </div>
          </div>
          <div
            x-show="$store.global.deviceType === 'mobile' && mobileActiveTab === 'category'"
            class="tag-filter-mobile-panel tag-filter-mobile-panel--category"
          >
            <div class="tag-category-editor-row">
              <span class="text-xs" style="color: var(--text-dim)"
                >已选择
                <span
                  class="text-accent font-bold"
                  x-text="categorySelectionCount"
                ></span>
                个标签</span
              >
              <button
                type="button"
                @click="selectedCategoryTags=[]"
                class="tag-category-clear"
              >
                清空选择
              </button>
            </div>
            <div class="text-xs" style="color: var(--text-dim)">
              可点击标签增减选择，也可用下方分隔符输入批量选中。
            </div>
            <div class="tag-category-editor-row tag-category-editor-row-main">
              <input
                type="text"
                x-model="categorySelectionInput"
                @keydown.enter.prevent="applyCategorySelectionInput()"
                placeholder="输入标签名，使用 |、逗号或换行批量选中当前可见标签"
                class="form-input"
                style="font-size: 0.82rem; padding: 0.45rem 0.6rem"
              />
              <button
                type="button"
                @click="applyCategorySelectionInput()"
                class="text-xs bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded text-white font-bold shadow-md"
              >
                批量选中
              </button>
            </div>
            <div class="tag-category-editor-row tag-category-editor-row-main">
              <input
                type="text"
                x-model="categoryDraftName"
                placeholder="分类名称（例如：角色 / 题材）"
                class="form-input"
                style="font-size: 0.82rem; padding: 0.45rem 0.6rem"
              />
              <input
                type="color"
                x-model="categoryDraftColor"
                class="tag-category-color-input"
                title="分类颜色"
              />
              <div class="tag-opacity-control" title="分类透明度（0-100）">
                <span class="tag-opacity-label">透明度</span>
                <input
                  type="range"
                  min="0"
                  max="100"
                  step="1"
                  x-model.number="categoryDraftOpacity"
                  class="tag-opacity-slider"
                />
                <input
                  type="number"
                  min="0"
                  max="100"
                  step="1"
                  x-model.number="categoryDraftOpacity"
                  class="tag-opacity-number"
                />
              </div>
              <button
                type="button"
                @click="saveCategoryBatch()"
                :disabled="!canSaveCategoryBatch"
                class="text-xs bg-green-700 hover:bg-green-600 px-3 py-1 rounded text-white font-bold shadow-md"
                :style="canSaveCategoryBatch ? '' : 'opacity: 0.55; cursor: not-allowed;'"
              >
                保存分类
              </button>
            </div>
            <div class="tag-category-quick-list">
              <template
                x-for="name in availableCategoryNames"
                :key="'mobile-cat-opt-' + name"
              >
                <button
                  type="button"
                  class="tag-category-quick-btn"
                  @click="setCategoryDraft(name)"
                  :class="categoryDraftName === name ? 'active' : ''"
                  :style="`--tag-cat-color:${getCategoryColor(name)};`"
                >
                  <span class="tag-category-quick-dot"></span>
                  <span x-text="name"></span>
                  <span
                    class="tag-category-quick-opacity"
                    x-text="getCategoryOpacity(name) + '%'"
                    title="当前透明度"
                  ></span>
                </button>
              </template>
            </div>
            <button
              type="button"
              @click="toggleCategoryManager()"
              class="text-xs bg-blue-700 hover:bg-blue-600 px-3 py-1 rounded text-white font-bold shadow-md"
              x-text="showCategoryManager ? '收起分类管理' : '分类管理'"
            ></button>
            <div
              x-show="$store.global.deviceType === 'mobile' && showCategoryManager && mobileActiveTab === 'category'"
              class="tag-filter-mobile-category-manager"
            >
              <div class="tag-category-editor-row tag-category-editor-row-main">
                <input
                  type="text"
                  x-model="categoryManagerDraftName"
                  placeholder="新增分类名称"
                  class="form-input"
                  style="font-size: 0.82rem; padding: 0.42rem 0.6rem"
                />
                <input
                  type="color"
                  x-model="categoryManagerDraftColor"
                  class="tag-category-color-input"
                  title="分类颜色"
                />
                <div class="tag-opacity-control" title="分类透明度（0-100）">
                  <span class="tag-opacity-label">透明度</span>
                  <input
                    type="range"
                    min="0"
                    max="100"
                    step="1"
                    x-model.number="categoryManagerDraftOpacity"
                    class="tag-opacity-slider"
                  />
                  <input
                    type="number"
                    min="0"
                    max="100"
                    step="1"
                    x-model.number="categoryManagerDraftOpacity"
                    class="tag-opacity-number"
                  />
                </div>
                <button
                  type="button"
                  @click="addCategoryFromManager()"
                  class="text-xs bg-blue-700 hover:bg-blue-600 px-3 py-1 rounded text-white font-bold shadow-md"
                >
                  新增/更新
                </button>
              </div>
              <div class="tag-category-manager-list custom-scrollbar">
                <template
                  x-for="item in categoryManagerItems"
                  :key="'mobile-mgr-' + item.name"
                >
                  <div class="tag-category-manager-item">
                    <div class="tag-category-manager-main">
                      <span
                        class="tag-category-manager-dot"
                        :style="`background:${item.color};`"
                      ></span>
                      <span
                        class="tag-category-manager-name"
                        x-text="item.name"
                      ></span>
                      <span
                        class="tag-category-manager-opacity-pill"
                        x-text="item.opacity + '%'"
                        title="当前透明度"
                      ></span>
                      <span
                        x-show="item.isDefault"
                        class="tag-category-manager-default"
                        >默认</span
                      >
                      <span
                        class="tag-category-manager-count"
                        x-text="item.count + ' 个标签'"
                      ></span>
                    </div>
                    <div class="tag-category-manager-actions">
                      <input
                        type="color"
                        :value="item.color"
                        class="tag-category-manager-color"
                        @change="setCategoryColor(item.name, $event.target.value)"
                        title="修改分类颜色"
                      />
                      <div
                        class="tag-category-manager-opacity-wrap"
                        title="修改分类不透明度（0-100）"
                      >
                        <input
                          type="range"
                          min="0"
                          max="100"
                          step="1"
                          :value="getCategoryOpacity(item.name)"
                          @change="setCategoryOpacity(item.name, $event.target.value)"
                          class="tag-category-manager-opacity-slider"
                        />
                        <span
                          class="tag-category-manager-opacity-text"
                          x-text="getCategoryOpacity(item.name)"
                        ></span>
                      </div>
                      <button
                        type="button"
                        class="tag-category-manager-btn"
                        @click="setDefaultCategory(item.name)"
                        :disabled="item.isDefault"
                        :style="item.isDefault ? 'opacity:0.45; cursor:not-allowed;' : ''"
                      >
                        设为默认
                      </button>
                      <button
                        type="button"
                        class="tag-category-manager-btn"
                        @click="moveCategory(item.name, -1)"
                        :disabled="item.index===0"
                        :style="item.index===0 ? 'opacity:0.45; cursor:not-allowed;' : ''"
                      >
                        上移
                      </button>
                      <button
                        type="button"
                        class="tag-category-manager-btn"
                        @click="moveCategory(item.name, 1)"
                        :disabled="item.index===categoryManagerItems.length-1"
                        :style="item.index===categoryManagerItems.length-1 ? 'opacity:0.45; cursor:not-allowed;' : ''"
                      >
                        下移
                      </button>
                      <button
                        type="button"
                        class="tag-category-manager-btn"
                        @click="renameCategory(item.name)"
                      >
                        重命名
                      </button>
                      <button
                        type="button"
                        class="tag-category-manager-btn danger"
                        @click="deleteCategory(item.name)"
                        :disabled="item.isDefault"
                        :style="item.isDefault ? 'opacity:0.45; cursor:not-allowed;' : ''"
                      >
                        删除
                      </button>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </div>
        </div>
        <div class="tag-filter-mobile-main custom-scrollbar">
          <div
            x-show="$store.global.deviceType === 'mobile' && mobileActiveTab === 'sort'"
          >
            <template x-if="isSortMode">
              <div>
                <template
                  x-for="tag in sortModeTagsPool"
                  :key="'m-sort-' + tag"
                >
                  <div class="tag-filter-mobile-sort-row">
                    <span class="tag-chip-drag-handle">☰</span>
                    <span
                      x-text="tag"
                      style="
                        flex: 1;
                        overflow: hidden;
                        text-overflow: ellipsis;
                        white-space: nowrap;
                      "
                    ></span>
                    <button type="button" @click="moveSortTagUp(tag)">
                      上移
                    </button>
                    <button type="button" @click="moveSortTagDown(tag)">
                      下移
                    </button>
                  </div>
                </template>
              </div>
            </template>
          </div>
          <div
            x-show="$store.global.deviceType === 'mobile' && mobileActiveTab !== 'sort'"
            class="tag-cloud-container custom-scrollbar"
          >
            <template x-if="!isSortMode">
              <div class="tag-cloud-mode-wrap">
                <template x-if="mixedCategoryView">
                  <template
                    x-for="tag in filteredMixedTagsPool"
                    :key="'mobile-mixed-' + tag"
                  >
                    <button
                      @click="isDeleteMode ? toggleTagSelectionForDeletion(tag) : (showCategoryMode ? toggleTagSelectionForCategory(tag) : toggleFilterTag(tag, $event))"
                      class="tag-chip-btn flex items-center"
                      :class="{
                                                'tag-chip-selected': !isDeleteMode && !showCategoryMode && filterTags.includes(tag),
                                                'tag-chip-excluded': !isDeleteMode && !showCategoryMode && excludedTags.includes(tag),
                                                'tag-chip-unselected tag-chip-categorized': !isDeleteMode && !showCategoryMode && !filterTags.includes(tag) && !excludedTags.includes(tag),
                                                'tag-chip-delete-selected': isDeleteMode && selectedTagsForDeletion.includes(tag),
                                                'tag-chip-delete-unselected': isDeleteMode && !selectedTagsForDeletion.includes(tag),
                                                'tag-chip-category-selected': showCategoryMode && selectedCategoryTags.includes(tag),
                                                'tag-chip-category-unselected tag-chip-categorized': showCategoryMode && !selectedCategoryTags.includes(tag)
                                            }"
                      :style="(!isDeleteMode && (filterTags.indexOf(tag) === -1) && (excludedTags.indexOf(tag) === -1)) ? getTagChipStyle(tag) : ''"
                      :title="!isDeleteMode && !showCategoryMode ? (filterTags.includes(tag) ? `标签：${tag}（已包含，点击改为排除）` : (excludedTags.includes(tag) ? `标签：${tag}（已排除，点击取消筛选）` : `标签：${tag}（分类：${getTagCategory(tag)}，点击加入筛选，Shift+点击可直接排除）`)) : (showCategoryMode ? `标签：${tag}（当前分类：${getTagCategory(tag)}）` : '')"
                    >
                      <span
                        x-show="isDeleteMode && selectedTagsForDeletion.includes(tag)"
                        class="mr-1 font-bold"
                        >✓</span
                      >
                      <span
                        x-show="showCategoryMode && selectedCategoryTags.includes(tag)"
                        class="mr-1 font-bold"
                        >✓</span
                      >
                      <span
                        class="tag-chip-label"
                        x-text="tag"
                        style="
                          overflow: hidden;
                          text-overflow: ellipsis;
                          white-space: nowrap;
                        "
                      ></span>
                    </button>
                  </template>
                </template>
                <template x-if="!mixedCategoryView">
                  <template
                    x-for="group in filteredTagGroups"
                    :key="'mobile-group-' + group.category"
                  >
                    <div class="tag-group-block">
                      <div class="tag-group-head">
                        <span
                          class="tag-group-dot"
                          :style="`background:${group.color};`"
                        ></span>
                        <span
                          class="tag-group-title"
                          x-text="group.category"
                        ></span>
                        <span
                          class="tag-group-count"
                          x-text="group.tags.length + ' 个'"
                        ></span>
                      </div>
                      <div class="tag-group-cloud">
                        <template
                          x-for="tag in group.tags"
                          :key="'mobile-tag-' + tag"
                        >
                          <button
                            @click="isDeleteMode ? toggleTagSelectionForDeletion(tag) : (showCategoryMode ? toggleTagSelectionForCategory(tag) : (isBlacklistMode ? toggleTagSelectionForBlacklist(tag) : toggleFilterTag(tag, $event)))"
                            class="tag-chip-btn flex items-center"
                            :class="{
                                                            'tag-chip-selected': !isDeleteMode && !showCategoryMode && filterTags.includes(tag),
                                                            'tag-chip-excluded': !isDeleteMode && !showCategoryMode && excludedTags.includes(tag),
                                                            'tag-chip-unselected tag-chip-categorized': !isDeleteMode && !showCategoryMode && !filterTags.includes(tag) && !excludedTags.includes(tag),
                                                            'tag-chip-delete-selected': isDeleteMode && selectedTagsForDeletion.includes(tag),
                                                            'tag-chip-delete-unselected': isDeleteMode && !selectedTagsForDeletion.includes(tag),
                                                            'tag-chip-category-selected': showCategoryMode && selectedCategoryTags.includes(tag),
                                                            'tag-chip-category-unselected tag-chip-categorized': showCategoryMode && !selectedCategoryTags.includes(tag)
                                                        }"
                            :style="(!isDeleteMode && (filterTags.indexOf(tag) === -1) && (excludedTags.indexOf(tag) === -1)) ? getTagChipStyle(tag) : ''"
                            :title="!isDeleteMode && !showCategoryMode ? (filterTags.includes(tag) ? `标签：${tag}（已包含，点击改为排除）` : (excludedTags.includes(tag) ? `标签：${tag}（已排除，点击取消筛选）` : `标签：${tag}（分类：${getTagCategory(tag)}，点击加入筛选，Shift+点击可直接排除）`)) : (showCategoryMode ? `标签：${tag}（当前分类：${getTagCategory(tag)}）` : '')"
                          >
                            <span
                              x-show="isDeleteMode && selectedTagsForDeletion.includes(tag)"
                              class="mr-1 font-bold"
                              >✓</span
                            >
                            <span
                              x-show="showCategoryMode && selectedCategoryTags.includes(tag)"
                              class="mr-1 font-bold"
                              >✓</span
                            >
                            <span
                              class="tag-chip-label"
                              x-text="tag"
                              style="
                                overflow: hidden;
                                text-overflow: ellipsis;
                                white-space: nowrap;
                              "
                            ></span>
                          </button>
                        </template>
                      </div>
                    </div>
                  </template>
                </template>
              </div>
            </template>
            <div
              x-show="!isSortMode && filteredVisibleTagCount === 0"
              style="
                width: 100%;
                text-align: center;
                color: var(--text-dim);
                margin-top: 2rem;
              "
            >
              无匹配标签
            </div>
          </div>
        </div>
        <div class="tag-filter-mobile-bottombar">
          <span x-show="mobileActiveTab === 'filter'">筛选面板</span>
          <span x-show="mobileActiveTab === 'sort'">排序面板</span>
          <span x-show="mobileActiveTab === 'delete'">删除面板</span>
          <span x-show="mobileActiveTab === 'category'">分类面板</span>
          <button
            type="button"
            x-show="mobileActiveTab === 'sort' && isSortMode"
            @click="saveSortMode()"
          >
            保存排序
          </button>
        </div>
      </div>
    </template>
    <template x-if="$store.global.deviceType !== 'mobile'">
      <div
        x-show="$store.global.deviceType !== 'mobile'"
        class="tag-filter-desktop-shell"
        :class="isDesktopWorkspaceFullscreen ? 'tag-filter-desktop-shell--fullscreen' : ''"
      >
        <div class="tag-filter-workspace-topbar">
          <div class="tag-filter-desktop-toolbar">
            <div class="tag-filter-workspace-topbar-main">
              <div class="tag-filter-workspace-heading">
                <div
                  class="text-xs tag-filter-workspace-eyebrow"
                  style="color: var(--text-dim)"
                >
                  桌面端标签工作台
                </div>
                <h3 class="tag-filter-workspace-title">
                  <span x-show="desktopWorkspaceMode === 'filter'"
                    >标签库筛选</span
                  >
                  <span
                    x-show="showCategoryMode && !isDeleteMode"
                    class="text-amber-300"
                    >批量分类标签</span
                  >
                  <span
                    x-show="desktopWorkspaceMode === 'sort'"
                    class="text-blue-300"
                    >标签排序</span
                  >
                  <span
                    x-show="desktopWorkspaceMode === 'blacklist' && !isDeleteMode"
                    class="text-rose-300"
                    >黑名单治理</span
                  >
                  <span x-show="isDeleteMode" class="text-red-400"
                    >永久删除标签</span
                  >
                  <span
                    x-show="desktopWorkspaceMode === 'category-manager' && !isDeleteMode"
                    class="text-sky-300"
                    >分类管理中心</span
                  >
                </h3>
              </div>
              <div class="tag-filter-workspace-topbar-search">
                <input
                  type="text"
                  x-model="tagSearchQuery"
                  aria-label="搜索标签"
                  placeholder="搜索标签..."
                  class="form-input"
                  :disabled="isSortMode"
                  :style="isSortMode ? 'padding: 0.75rem; font-size: 1rem; opacity: 0.6; cursor: not-allowed;' : 'padding: 0.75rem; font-size: 1rem;'"
                />
              </div>
              <div class="tag-filter-workspace-topbar-status">
                <div class="tag-filter-workspace-selection-summary">
                  <span class="text-sm" style="color: var(--text-dim)"
                    >已选
                    <span
                      x-text="filterTags.length + excludedTags.length"
                      class="text-accent font-bold"
                    ></span>
                    个标签</span
                  >
                  <span class="text-sm" style="color: var(--text-dim)"
                    >可见
                    <span
                      x-text="filteredVisibleTagCount"
                      class="text-accent font-bold"
                    ></span>
                    个标签</span
                  >
                </div>
                <span
                  x-show="!isDeleteMode"
                  class="text-xs px-2 py-1 rounded-full"
                  :style="customOrderEnabled ? 'background: color-mix(in srgb, var(--accent-main), transparent 82%); color: var(--accent-light); border: 1px solid color-mix(in srgb, var(--accent-main), transparent 50%);' : 'background: var(--bg-sub); color: var(--text-dim); border: 1px solid var(--border-light);'"
                  x-text="customOrderEnabled ? '当前：自定义排序' : '当前：字符排序'"
                ></span>
              </div>
            </div>
            <div class="tag-filter-workspace-topbar-actions">
              <button
                type="button"
                x-show="customOrderEnabled"
                class="tag-filter-workspace-top-tab tag-filter-workspace-top-tab--utility"
                @click="clearCustomOrder()"
              >
                恢复字符排序
              </button>
              <button
                type="button"
                class="tag-filter-workspace-top-tab tag-filter-workspace-top-tab--utility"
                :class="isWorkspaceHelpOpen ? 'is-active' : ''"
                @click="toggleWorkspaceHelp()"
              >
                帮助
              </button>
              <button
                type="button"
                class="tag-filter-workspace-top-tab tag-filter-workspace-top-tab--utility tag-filter-governance-drawer-toggle"

                        </li>

                          中间标签池是主要操作区域，右侧工具区只显示当前模式相关工具。
                        </li>
                      </ul>
                    </section>
                    <section
                      class="tag-filter-workspace-help-card"
                      data-workspace-help-section="search-view"
                    >
                      <div class="tag-filter-workspace-help-card-title">
                        搜索与视图
                      </div>
                      <ul class="tag-filter-workspace-help-list">
                        <li>
                          搜索框支持多个关键词并集匹配，适合先缩小范围再操作。
                        </li>
                        <li>
                          <code>|</code> 一直可以分隔多个关键词；<code>/</code>
                          是否分隔取决于自动化相关设置。
                        </li>
                        <li>
                          混合视图适合快速点选标签；分组视图适合按分类核对标签分布。
                        </li>
                        <li>
                          分类条支持包含、排除和恢复三态，Shift+点击可直接进入排除。
                        </li>
                      </ul>
                    </section>
                    <section
                      class="tag-filter-workspace-help-card"
                      data-workspace-help-section="separator-rules"
                    >
                      <div class="tag-filter-workspace-help-card-title">
                        分隔符规则
                      </div>
                      <ul class="tag-filter-workspace-help-list">
                        <li>
                          搜索框中的分隔符是“并集搜索”语义，不会把内容写入标签库，只用于匹配候选标签。
                        </li>
                        <li>
                          <code>|</code>
                          在搜索场景中始终表示“多个关键词并集匹配”，例如
                          <code>猫|犬</code> 会匹配包含“猫”或“犬”的标签。
                        </li>
                        <li>
                          <code>/</code> 在搜索场景中是否也作为分隔符，取决于
                          <code>automation_slash_is_tag_separator</code> 设置。
                        </li>
                        <li>
                          手动输入类场景中的分隔符是“拆成多个字面标签”语义，例如批量添加、详情弹窗手动加标签、治理黑名单输入。
                        </li>
                        <li>
                          批量分类模式下的“批量选中”输入框也遵循这个规则：会把文本拆成多个标签名，并在当前可见标签池中做精确命中选择。
                        </li>
                        <li>
                          在手动输入场景中，<code>|</code> 与可选的
                          <code>/</code> 都用于拆分多个标签
                          token，而不是做模糊搜索。
                        </li>
                        <li>
                          筛选模式、分组视图、分类条这些都是“选现有标签”，不解析你点击时的分隔符文本。
                        </li>
                      </ul>
                    </section>
                    <section
                      class="tag-filter-workspace-help-card"
                      data-workspace-help-section="filter-mode"
                    >
                      <div class="tag-filter-workspace-help-card-title">
                        筛选模式
                      </div>
                      <ul class="tag-filter-workspace-help-list">
                        <li>点击标签会在包含、排除、取消之间循环切换。</li>
                        <li>
                          筛选模式不会修改标签库结构，只影响当前标签过滤结果。
                        </li>
                        <li>
                          如果已选标签过多，建议先用分类条缩小范围再微调单个标签。
                        </li>
                      </ul>
                    </section>
                    <section
                      class="tag-filter-workspace-help-card"
                      data-workspace-help-section="batch-category-mode"
                    >
                      <div class="tag-filter-workspace-help-card-title">
                        批量分类模式
                      </div>
                      <ul class="tag-filter-workspace-help-list">
                        <li>
                          先在标签池中选中多个标签，再在右侧设置目标分类、颜色和透明度。
                        </li>
                        <li>
                          保存后会批量写入分类；若分类不存在，会自动创建。
                        </li>
                        <li>适合第一次建立分类体系，或把零散标签快速归类。</li>
                      </ul>
                    </section>
                    <section
                      class="tag-filter-workspace-help-card"
                      data-workspace-help-section="sort-mode"
                    >
                      <div class="tag-filter-workspace-help-card-title">
                        排序模式
                      </div>
                      <ul class="tag-filter-workspace-help-list">
                        <li>排序模式用于调整完整标签库的全局顺序。</li>
                        <li>
                          混合视图下拖拽标签可调整全局顺序；分组视图下还能拖拽分类标题和分类内标签。
                        </li>
                        <li>
                          恢复字符排序会清除全局自定义顺序并回到默认排序。
                        </li>
                      </ul>
                    </section>
                    <section
                      class="tag-filter-workspace-help-card"
                      data-workspace-help-section="delete-mode"
                    >
                      <div class="tag-filter-workspace-help-card-title">
                        删除模式
                      </div>
                      <ul class="tag-filter-workspace-help-list">
                        <li>
                          删除模式用于永久删除标签，请先在中间标签池中把目标标签加入待删除列表。
                        </li>
                        <li>删除不可撤销，只建议在确认标签无用时使用。</li>
                        <li>
                          如果只是想暂时不看某些标签，请使用筛选模式而不是删除模式。
                        </li>
                      </ul>
                    </section>
                    <section
                      class="tag-filter-workspace-help-card"
                      data-workspace-help-section="blacklist-mode"
                    >
                      <div class="tag-filter-workspace-help-card-title">
                        黑名单模式
                      </div>
                      <ul class="tag-filter-workspace-help-list">
                        <li>
                          黑名单模式用于集中维护治理黑名单，可直接点击标签加入选择，也可用分隔符批量加入。
                        </li>
                        <li>
                          保存后，这些标签会被自动流程和批量流程跳过；手动单个编辑不受影响。
                        </li>
                        <li>
                          已在黑名单中的标签会显示在列表里，点击即可移出。
                        </li>
                      </ul>
                    </section>
                    <section
                      class="tag-filter-workspace-help-card"
                      data-workspace-help-section="category-manager-mode"
                    >
                      <div class="tag-filter-workspace-help-card-title">
                        分类管理模式
                      </div>
                      <ul class="tag-filter-workspace-help-list">
                        <li>
                          分类管理用于维护分类定义本身：新增、重命名、设为默认、删除、颜色和透明度调整。
                        </li>
                        <li>
                          新增空分类后，也会立即出现在分类条和相关选择器中。
                        </li>
                        <li>
                          删除分类时，该分类下标签会迁移到默认分类，而不是直接丢失映射。
                        </li>
                      </ul>
                    </section>
                    <section
                      class="tag-filter-workspace-help-card"
                      data-workspace-help-section="governance"
                    >
                      <div class="tag-filter-workspace-help-card-title">
                        治理设置说明
                      </div>
                      <ul class="tag-filter-workspace-help-list">
                        <li>
                          记住上次标签视图会保存视图模式和分类筛选状态，方便下次继续。
                        </li>
                        <li>
                          锁定标签库治理主要约束自动化来源和批量来源，减少意外污染标签库。
                        </li>
                        <li>
                          标签黑名单已独立为工作台模式，治理设置本身只保留准入开关和视图记忆。
                        </li>
                      </ul>
                    </section>
                    <section
                      class="tag-filter-workspace-help-card"
                      data-workspace-help-section="workflow"
                    >
                      <div class="tag-filter-workspace-help-card-title">
                        推荐工作流
                      </div>
                      <ol class="tag-filter-workspace-help-steps">
                        <li>先在筛选模式用搜索和分类条摸清标签分布。</li>
                        <li>再切到批量分类，把明显散乱或未分类标签先归类。</li>
                        <li>
                          然后进入分类管理，整理分类定义、默认分类与视觉配置。
                        </li>
                        <li>
                          最后用排序模式优化全局顺序，以及分组视图中的分类顺序和分类内顺序。
                        </li>
                        <li>只有确认标签确实无用时，再进入删除模式清理。</li>
                      </ol>
                    </section>
                    <section
                      class="tag-filter-workspace-help-card"
                      data-workspace-help-section="faq"
                    >
                      <div class="tag-filter-workspace-help-card-title">
                        常见问题
                      </div>
                      <ul class="tag-filter-workspace-help-list">
                        <li>
                          分组视图里看不到某个分类：先检查分类条是否把它排除了，或该分类下当前没有匹配标签。
                        </li>
                        <li>
                          新增分类后没看到：确认保存成功；空分类现在也应立即显示。
                        </li>
                        <li>
                          排序退出不了：通常是因为存在未保存改动，系统会先要求确认。
                        </li>
                      </ul>
                    </section>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </template>
  </div>
</div>
