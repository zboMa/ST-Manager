<div x-show="detailOpen" x-cloak class="chat-reader-overlay chat-reader-overlay--fullscreen" @click.self="closeChatDetail()">
    <div class="chat-reader-modal chat-reader-modal--fullscreen">
        <div class="chat-reader-header">
            <div class="chat-reader-header-main">
                <button type="button" class="chat-reader-exit" @click="closeChatDetail()">← 返回聊天管理</button>
                <div>
                    <div class="chat-grid-kicker">Chat Reader</div>
                    <div style="min-width: 0;">
                        <h3 class="chat-reader-title" x-text="activeChat ? (activeChat.title || activeChat.chat_name) : '聊天记录'"></h3>
                        <div class="chat-reader-subtitle" x-text="activeChat ? ((activeChat.bound_card_name || activeChat.character_name || '未绑定角色') + ' · ' + (activeChat.message_count || 0) + ' 层') : ''"></div>
                    </div>
                </div>
            </div>

            <div class="chat-reader-header-actions">
                <div class="chat-reader-header-tools">
                    <button class="chat-reader-toggle" :class="readerShowLeftPanel ? 'is-active' : ''" @click="readerShowLeftPanel = !readerShowLeftPanel">左栏</button>
                    <button class="chat-reader-toggle" :class="readerShowRightPanel ? 'is-active' : ''" @click="readerShowRightPanel = !readerShowRightPanel">右栏</button>
                </div>
                <button class="chat-toolbar-btn" @click="saveChatMeta()">💾 保存备注</button>
                <button class="chat-toolbar-btn" @click="closeChatDetail()">✕ 关闭</button>
            </div>
        </div>

        <div class="chat-reader-body" :style="readerBodyGridStyle">
            <aside x-show="readerShowLeftPanel" class="chat-reader-left custom-scrollbar">
                <div class="chat-reader-panel">
                    <div class="chat-reader-panel-title">聊天信息</div>
                    <div class="chat-reader-info-grid" x-show="activeChat">
                        <div class="chat-reader-info-row"><span>角色</span><strong x-text="activeChat?.bound_card_name || activeChat?.character_name || '未绑定'"></strong></div>
                        <div class="chat-reader-info-row"><span>聊天名</span><strong x-text="activeChat?.chat_name || activeChat?.filename"></strong></div>
                        <div class="chat-reader-info-row"><span>创建</span><strong x-text="formatChatDate(activeChat?.created_at || activeChat?.file_mtime)"></strong></div>
                        <div class="chat-reader-info-row"><span>导入</span><strong x-text="formatChatDate(activeChat?.import_time || activeChat?.file_mtime)"></strong></div>
                    </div>

                    <div class="chat-reader-actions">
                        <button class="chat-toolbar-btn" @click="activeChat && jumpToBoundCard(activeChat)" :disabled="!activeChat || !activeChat.bound_card_id">跳到角色卡</button>
                        <button class="chat-toolbar-btn" @click="activeChat && openBindPicker(activeChat)" :disabled="!activeChat">修改绑定</button>
                        <button class="chat-toolbar-btn" @click="activeChat && openChatFolder(activeChat)" :disabled="!activeChat">打开目录</button>
                        <button class="chat-toolbar-btn chat-toolbar-btn--danger" @click="activeChat && deleteChat(activeChat)" :disabled="!activeChat">删除聊天</button>
                    </div>
                </div>

                <div class="chat-reader-panel" x-show="activeChat">
                    <div class="chat-reader-panel-title">本地信息</div>
                    <label class="chat-reader-field">
                        <span>显示名称</span>
                        <input type="text" x-model="detailDraftName" class="form-input">
                    </label>
                    <label class="chat-reader-field">
                        <span>本地备注</span>
                        <textarea x-model="detailDraftNotes" class="form-textarea" style="min-height: 8rem;"></textarea>
                    </label>
                </div>

                <div class="chat-reader-panel" x-show="activeChat">
                    <div class="chat-reader-panel-title">收藏楼层</div>
                    <div class="chat-reader-bookmark-input">
                        <input type="text" x-model="bookmarkDraft" class="form-input" placeholder="收藏标签（可选）">
                        <button class="chat-toolbar-btn" @click="detailBookmarkedOnly = !detailBookmarkedOnly"
                            :class="detailBookmarkedOnly ? 'chat-toolbar-btn--primary' : ''">只看收藏</button>
                    </div>
                    <div class="chat-reader-bookmark-list">
                        <template x-for="bookmark in (activeChat?.bookmarks || [])" :key="bookmark.id">
                            <button type="button" class="chat-bookmark-chip" @click="scrollToFloor(bookmark.floor)">
                                <span x-text="'#' + bookmark.floor"></span>
                                <span x-show="bookmark.label" x-text="bookmark.label"></span>
                            </button>
                        </template>
                        <div x-show="!activeChat?.bookmarks || activeChat.bookmarks.length === 0" class="chat-bookmark-empty">还没有收藏楼层</div>
                    </div>
                </div>
            </aside>

            <main class="chat-reader-center custom-scrollbar">
                <div class="chat-reader-workbar">
                    <div class="chat-reader-workgroup">
                        <div class="chat-reader-panel-title">楼层跳转</div>
                        <div class="chat-inline-actions">
                            <input type="text" x-model="jumpFloorInput" class="chat-inline-input chat-inline-input--compact" placeholder="#856" @keydown.enter.prevent="jumpToInputFloor()">
                            <button class="chat-toolbar-btn" @click="jumpToInputFloor()">跳转</button>
                            <button class="chat-toolbar-btn" @click="jumpToEdge('first')">首层</button>
                            <button class="chat-toolbar-btn" @click="jumpToEdge('last')">末层</button>
                        </div>
                    </div>

                    <div class="chat-reader-workgroup">
                        <div class="chat-reader-panel-title">本地编辑模式</div>
                        <div class="chat-inline-actions">
                            <input type="text" x-model="replaceQuery" class="chat-inline-input chat-inline-input--wide" placeholder="查找内容">
                            <input type="text" x-model="replaceReplacement" class="chat-inline-input chat-inline-input--wide" placeholder="替换为">
                        </div>
                        <div class="chat-inline-actions">
                            <label class="chat-inline-checkbox">
                                <input type="checkbox" x-model="replaceCaseSensitive">
                                <span>区分大小写</span>
                            </label>
                            <button class="chat-toolbar-btn" @click="replaceAllInChat()">全部替换</button>
                        </div>
                        <div class="chat-reader-replace-status" x-text="replaceStatus || '会直接写回当前聊天文件。'"></div>
                    </div>
                </div>

                <div x-show="detailLoading" class="chat-reader-loading">正在读取聊天内容...</div>

                <template x-if="activeChat && !detailLoading">
                    <div class="chat-message-list">
                        <template x-for="message in visibleDetailMessages" :key="message.floor">
                            <article class="chat-message-card" :class="messageBadgeClass(message)" :data-chat-floor="message.floor">
                                <div class="chat-message-head">
                                    <div class="chat-message-floor-wrap">
                                        <button type="button" class="chat-floor-chip" @click="scrollToFloor(message.floor)">#<span x-text="message.floor"></span></button>
                                        <button type="button" class="chat-bookmark-toggle" :class="isBookmarked(message.floor) ? 'is-active' : ''" @click="toggleBookmark(message)">☆</button>
                                    </div>
                                    <div class="chat-message-meta">
                                        <strong x-text="message.name || (message.is_user ? 'User' : 'Assistant')"></strong>
                                        <span x-text="formatChatDate(message.send_date)"></span>
                                    </div>
                                </div>

                                <div class="chat-message-timebar" x-show="message.time_bar" x-text="message.time_bar"></div>
                                <div class="chat-message-content" x-text="message.content || message.mes"></div>

                                <div x-show="message.thinking" class="chat-message-sideblock">
                                    <div class="chat-message-sideblock-title">思维链</div>
                                    <div x-text="message.thinking"></div>
                                </div>

                                <div x-show="message.summary" class="chat-message-sideblock">
                                    <div class="chat-message-sideblock-title">小总结</div>
                                    <div x-text="message.summary"></div>
                                </div>

                                <div x-show="message.choices && message.choices.length > 0" class="chat-message-sideblock">
                                    <div class="chat-message-sideblock-title">选项</div>
                                    <div class="chat-choice-list">
                                        <template x-for="choice in message.choices" :key="choice.text + choice.desc">
                                            <div class="chat-choice-item">
                                                <strong x-text="choice.text"></strong>
                                                <span x-text="choice.desc"></span>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </article>
                        </template>
                    </div>
                </template>
            </main>

            <aside x-show="readerShowRightPanel" class="chat-reader-right custom-scrollbar">
                <div class="chat-reader-panel">
                    <div class="chat-reader-panel-title">全文搜索</div>
                    <label class="chat-reader-field">
                        <span>关键字</span>
                        <input type="text" x-model="detailSearchQuery" class="form-input" @keydown.enter.prevent="searchInDetail()">
                    </label>
                    <div class="chat-reader-search-actions">
                        <button class="chat-toolbar-btn" @click="searchInDetail()">搜索</button>
                        <button class="chat-toolbar-btn" @click="previousSearchResult()" :disabled="detailSearchResults.length===0">上一个</button>
                        <button class="chat-toolbar-btn" @click="nextSearchResult()" :disabled="detailSearchResults.length===0">下一个</button>
                    </div>
                    <div class="chat-reader-search-meta" x-text="detailSearchResults.length > 0 ? ('命中 ' + detailSearchResults.length + ' 条') : '暂无命中'"></div>
                </div>

                <div class="chat-reader-panel" x-show="activeChat">
                    <div class="chat-reader-panel-title">楼层导航</div>
                    <div class="chat-floor-nav-list">
                        <template x-for="message in visibleDetailMessages" :key="'nav-' + message.floor">
                            <button type="button" class="chat-floor-nav-item" @click="scrollToFloor(message.floor)">
                                <span class="chat-floor-nav-index" x-text="'#' + message.floor"></span>
                                <span class="chat-floor-nav-text" x-text="(message.content || message.mes || '').trim().slice(0, 48) || '空内容'"></span>
                            </button>
                        </template>
                    </div>
                </div>
            </aside>
        </div>
    </div>
</div>

<div x-show="bindPickerOpen" x-cloak class="chat-reader-overlay" style="z-index: var(--z-modal-popover);" @click.self="closeBindPicker()">
    <div class="chat-bind-modal">
        <div class="chat-bind-header">
            <div>
                <div class="chat-grid-kicker">Bind Character</div>
                <div class="chat-reader-title" style="font-size: 1.05rem;">选择要绑定的角色卡</div>
            </div>
            <div class="chat-bind-actions">
                <button class="chat-toolbar-btn" @click="unbindCurrentChat()">解除绑定</button>
                <button class="chat-toolbar-btn" @click="closeBindPicker()">关闭</button>
            </div>
        </div>

        <div class="chat-inline-actions">
            <input type="text" x-model="bindPickerSearch" class="chat-inline-input chat-inline-input--wide" placeholder="搜索角色卡名称" @keydown.enter.prevent="fetchBindPickerResults()">
            <button class="chat-toolbar-btn" @click="fetchBindPickerResults()">搜索</button>
        </div>

        <div x-show="bindPickerLoading" class="chat-bind-empty">正在加载候选角色卡...</div>

        <div x-show="!bindPickerLoading && bindPickerResults.length === 0" class="chat-bind-empty">没有找到匹配的角色卡。</div>

        <div x-show="!bindPickerLoading && bindPickerResults.length > 0" class="chat-bind-results custom-scrollbar">
            <template x-for="card in bindPickerResults" :key="card.id">
                <button type="button" class="chat-bind-card-item" @click="bindCardPick(card)">
                    <span class="chat-bind-card-index">🎴</span>
                    <span class="chat-bind-card-text" x-text="card.char_name || card.filename || card.id"></span>
                </button>
            </template>
        </div>
    </div>
</div>
